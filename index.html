<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan Kinerja Penyuluh - Kementan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 40px 0; }
        .form-card { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
        .header-section { background: #198754; color: white; padding: 20px; border-radius: 15px 15px 0 0; }
        .section-title { color: #198754; border-bottom: 2px solid #198754; padding-bottom: 5px; margin: 25px 0 15px 0; }
        #loading { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card form-card">
                <div class="header-section text-center">
                    <h4>LAPORAN KINERJA INDIVIDU</h4>
                    <p class="mb-0">Penyuluhan dan Pengembangan SDM Pertanian</p>
                </div>
                
                <div class="card-body p-4">
                    <form id="laporanForm">
                        <h5 class="section-title">I. Identitas Pegawai</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nama Lengkap & Gelar [cite: 5, 46]</label>
                                <input type="text" class="form-control" id="nama" placeholder="Contoh: Nama Lengkap + Gelar" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">NIP [cite: 6, 47]</label>
                                <input type="text" class="form-control" id="nip" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Jabatan [cite: 4, 45]</label>
                                <input type="text" class="form-control" id="jabatan" value="PENYULUH PERTANIAN AHLI MADYA" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Bulan Pelaporan [cite: 3, 35]</label>
                                <select class="form-select" id="bulan">
                                    <option value="JANUARI">JANUARI</option>
                                    <option value="FEBRUARI">FEBRUARI</option>
                                </select>
                            </div>
                        </div>

                        <h5 class="section-title">II. Capaian Kinerja Utama</h5>
                        <div class="table-responsive">
                            <table class="table table-bordered align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Kegiatan </th>
                                        <th>Rincian & Link Eviden </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>Peningkatan Produksi Hortikultura </td>
                                        <td><textarea class="form-control rincian" data-kegiatan="Hortikultura" rows="2"></textarea></td>
                                    </tr>
                                    <tr>
                                        <td>Luas Tambah Tanam Padi </td>
                                        <td><textarea class="form-control rincian" data-kegiatan="Padi LTT" rows="2"></textarea></td>
                                    </tr>
                                    <tr>
                                        <td>Pupuk Subsidi & CSR [cite: 36, 39]</td>
                                        <td><textarea class="form-control rincian" data-kegiatan="Pupuk & CSR" rows="2"></textarea></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <h5 class="section-title">III. Kesimpulan </h5>
                        <div class="mb-3">
                            <button type="button" class="btn btn-outline-primary mb-2" onclick="generateKesimpulan()">
                                ✨ Buat Kesimpulan Otomatis (AI)
                            </button>
                            <div id="loading" class="spinner-border spinner-border-sm text-primary ms-2"></div>
                            <textarea class="form-control" id="kesimpulan" rows="4" placeholder="Kesimpulan akan muncul di sini..."></textarea>
                        </div>

                        <div class="text-end mt-4">
                            <button type="button" class="btn btn-secondary me-2" onclick="window.print()">Cetak PDF </button>
                            <button type="submit" class="btn btn-success px-5">Simpan Laporan</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const GROQ_API_KEY = "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";

    async function generateKesimpulan() {
        const loading = document.getElementById('loading');
        const rincianInputs = document.querySelectorAll('.rincian');
        let textData = "";

        rincianInputs.forEach(input => {
            if(input.value) textData += `- ${input.getAttribute('data-kegiatan')}: ${input.value}\n`;
        });

        if (!textData) {
            alert("Harap isi rincian kegiatan terlebih dahulu.");
            return;
        }

        loading.style.display = 'inline-block';

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama3-8b-8192",
                    messages: [
                        {
                            role: "system", 
                            content: "Anda adalah asisten admin Kementan. Buatkan satu paragraf kesimpulan laporan kinerja penyuluhan yang formal berdasarkan data rincian kegiatan yang diberikan."
                        },
                        {
                            role: "user", 
                            content: `Berikut rincian kegiatan saya: ${textData}`
                        }
                    ]
                })
            });

            const data = await response.json();
            document.getElementById('kesimpulan').value = data.choices[0].message.content;
        } catch (error) {
            console.error("Error:", error);
            alert("Gagal menghubungi AI. Pastikan API Key aktif.");
        } finally {
            loading.style.display = 'none';
        }
    }

    document.getElementById('laporanForm').onsubmit = (e) => {
        e.preventDefault();
        alert("Data berhasil divalidasi dan siap diproses ke sistem e-personal.");
    };
</script>

</body>
</html>
